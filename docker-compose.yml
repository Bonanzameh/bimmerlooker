services:
  bimmerlooker:
    build:
      context: https://github.com/Bonanzameh/bimmerlooker.git#main
      dockerfile: Dockerfile
    container_name: bimmerlooker
    ports:
      - "4173:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
    volumes:
      - bimmerlooker_data:/app/data
      - bimmerlooker_reports:/app/reports
    restart: unless-stopped

volumes:
  bimmerlooker_data:
  bimmerlooker_reports:
